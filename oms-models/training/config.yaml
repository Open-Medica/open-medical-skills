# OMS ToolRAG Training Configuration
# Fine-tune embedding models for medical tool/skill retrieval

models:
  embeddinggemma:
    name: "google/embeddinggemma-300m"
    local_path: "models/embeddinggemma-300m"
    output_dir: "models/oms-toolrag-gemma-v1"
    batch_size: 128
    learning_rate: 2.0e-5
    epochs: 3
    warmup_ratio: 0.1
    loss: "CachedMultipleNegativesRankingLoss"
    mini_batch_size: 8
    max_seq_length_query: 128
    max_seq_length_doc: 512
    fp16: true
    eval_steps: 100
    matryoshka_dims: [768, 512, 256, 128]

  gte_qwen2:
    name: "Alibaba-NLP/gte-Qwen2-1.5B-instruct"
    local_path: "models/gte-qwen2-1.5b"
    output_dir: "models/oms-toolrag-qwen-v1"
    batch_size: 32
    learning_rate: 2.0e-5
    epochs: 3
    warmup_ratio: 0.1
    loss: "MultipleNegativesRankingLoss"
    max_seq_length_query: 128
    max_seq_length_doc: 512
    fp16: true
    eval_steps: 100
    gradient_checkpointing: true
    lora:
      enabled: true
      r: 16
      lora_alpha: 32
      lora_dropout: 0.05
      target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]

data:
  train_path: "data/processed/train"
  val_path: "data/processed/val"
  test_path: "data/processed/test"

evaluation:
  metrics: ["mrr@5", "recall@1", "recall@5", "recall@10", "ndcg@10"]
  test_queries: 500

deployment:
  qdrant_collection: "oms_tools_custom"
  huggingface_repo: "intelmedica/oms-toolrag-v1"
