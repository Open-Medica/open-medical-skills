name: "tu-me-sh-get-descriptor"
display_name: "MeSH get descriptor"
description: "Get detailed information for a MeSH descriptor by its ID. Returns the descriptor's label, type, annotation, tree numbers (for hierarchical browsing), date of introduction, and related terms. MeSH tree numbers encode the hierarchical position in the 16 MeSH categories (A=Anatomy, B=Organisms, C=Diseases, D=Chemicals, E=Analytical, etc.). Example: D009369 returns 'Neoplasms' with tree number C04, annotation about cancer terminology, and 'considerAlso' cross-references."
