name: "tu-pharmaco-db-search"
display_name: "PharmacoDB search"
description: "Search PharmacoDB for compounds, cell lines, tissues, or genes by name. PharmacoDB integrates cancer pharmacogenomics data from 10 major datasets (CCLE, CTRPv2, FIMM, GDSC1, GDSC2, GRAY, NCI60, PRISM, UHNBreast, gCSI). Returns matching entities with their PharmacoDB UIDs and type (compound, cell_line, tissue, gene). Use this to find PharmacoDB identifiers for use with other PharmacoDB tools. Example: search for 'paclitaxel' to find its PharmacoDB compound ID."
