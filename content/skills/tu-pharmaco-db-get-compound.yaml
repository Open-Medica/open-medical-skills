name: "tu-pharmaco-db-get-compound"
display_name: "PharmacoDB get compound"
description: "Get detailed information about a compound/drug from PharmacoDB, including chemical annotations (SMILES, InChIKey, PubChem CID, ChEMBL ID, FDA approval status), the datasets it has been profiled in, and its known molecular targets with associated genes. Look up by compound name or PharmacoDB compound ID. Useful for characterizing drug properties and identifying which pharmacogenomics datasets include a specific compound. Example: get details for Paclitaxel, Erlotinib, or Lapatinib."
