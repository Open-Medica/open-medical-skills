description: "Get HPO (Human Phenotype Ontology) phenotypes associated with a Mondo disease. Returns the phenotype IDs (HP:xxxxxxx), names, and the specific disease subtype contributing each phenotype. Data comes from OMIM, Orphanet, and clinical annotations. Use this to understand clinical presentations and symptoms of a disease. First find the Mondo ID using Mondo_search_disease, then query phenotypes here."
