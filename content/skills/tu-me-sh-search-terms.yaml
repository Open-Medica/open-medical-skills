name: "tu-me-sh-search-terms"
display_name: "MeSH search terms"
description: "Search MeSH terms (entry terms/synonyms) by label. MeSH terms include the preferred descriptor names as well as alternative entry terms, synonyms, and common names. This is broader than descriptor search and can find terms like 'heart attack' that map to the descriptor 'Myocardial Infarction'. Supports exact, contains, and startswith matching. Example: searching 'tumor' returns terms like 'Tumors', 'Tumor Growth', 'Tumors, Neoplastic'."
