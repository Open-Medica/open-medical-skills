name: CI
on:
  push:
    branches: [dev, 'feat/**', 'fix/**']
  pull_request:
    branches: [dev, main]

jobs:
  type-check-build:
    name: "Type Check & Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm exec astro check
      - name: Build
        run: pnpm build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for leaked secrets
        run: |
          if grep -rn '100\.\(88\|120\)\.' --include='*.ts' --include='*.tsx' --include='*.astro' --include='*.toml' --include='*.json' --exclude-dir=node_modules --exclude-dir=.git .; then
            echo "::error::Found potential internal IP addresses in source files"
            exit 1
          fi
          if grep -rn 'password\s*=\s*["\x27][^"\x27]*["\x27]' --include='*.ts' --include='*.toml' --exclude-dir=node_modules --exclude-dir=.git .; then
            echo "::error::Found potential hardcoded passwords in source files"
            exit 1
          fi

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit main dependencies
        run: pnpm audit --audit-level=moderate || echo "::warning::Dependency vulnerabilities found"
      - name: Audit search-api dependencies
        run: cd workers/search-api && npm audit --audit-level=moderate 2>/dev/null || echo "::warning::search-api vulnerabilities found"
      - name: Audit submission-api dependencies
        run: cd workers/submission-api && npm audit --audit-level=moderate 2>/dev/null || echo "::warning::submission-api vulnerabilities found"

  credential-scan:
    name: Credential Leak Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Scan for leaked credentials
        run: |
          echo "Scanning for credential leaks..."
          FOUND=0
          # AWS Access Keys
          if grep -rEn 'AKIA[0-9A-Z]{16}' --include='*.ts' --include='*.js' --include='*.json' --include='*.toml' --include='*.yaml' --include='*.yml' . 2>/dev/null | grep -v node_modules | grep -v '.git/'; then
            echo "::error::AWS Access Key detected"
            FOUND=1
          fi
          # GitHub PATs
          if grep -rEn 'ghp_[a-zA-Z0-9]{36}' --include='*.ts' --include='*.js' --include='*.json' --include='*.toml' --include='*.yaml' --include='*.yml' . 2>/dev/null | grep -v node_modules | grep -v '.git/'; then
            echo "::error::GitHub PAT detected"
            FOUND=1
          fi
          # OpenAI/Anthropic keys
          if grep -rEn 'sk-[a-zA-Z0-9]{20,}' --include='*.ts' --include='*.js' --include='*.json' --include='*.toml' --include='*.yaml' --include='*.yml' . 2>/dev/null | grep -v node_modules | grep -v '.git/'; then
            echo "::error::API key detected"
            FOUND=1
          fi
          # Hardcoded passwords
          if grep -rEn "password\s*[:=]\s*[\"'][^\"']{8,}" --include='*.ts' --include='*.js' --include='*.json' --include='*.toml' . 2>/dev/null | grep -v node_modules | grep -v '.git/' | grep -v 'package-lock'; then
            echo "::error::Hardcoded password detected"
            FOUND=1
          fi
          # Internal IPs (Tailscale CGNAT range used by IntelMedica infra)
          if grep -rEn '100\.(8[89]|9[0-9]|1[01][0-9]|12[0-7])\.[0-9]+\.[0-9]+' --include='*.ts' --include='*.js' --include='*.json' --include='*.toml' --include='*.yaml' --include='*.yml' . 2>/dev/null | grep -v node_modules | grep -v '.git/'; then
            echo "::error::Internal IP address detected"
            FOUND=1
          fi
          if [ $FOUND -eq 1 ]; then
            echo "::error::Credential leak scan failed — review flagged items above"
            exit 1
          fi
          echo "No credential leaks detected"

  sast-scan:
    name: SAST Security Scan (Semgrep)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep SAST
        run: semgrep scan --config auto --config p/owasp-top-ten --config p/secrets --error --json --output semgrep-results.json src/ workers/ || true
      - name: Check for high severity findings
        run: |
          if [ -f semgrep-results.json ]; then
            HIGH=$(python3 -c "import json; r=json.load(open('semgrep-results.json')); print(sum(1 for f in r.get('results',[]) if f.get('extra',{}).get('severity','') in ['ERROR','WARNING']))")
            echo "High/Warning severity findings: $HIGH"
            if [ "$HIGH" -gt 0 ]; then
              echo "::error::Semgrep found $HIGH high/warning severity issues"
              python3 -c "
          import json
          r = json.load(open('semgrep-results.json'))
          for f in r.get('results', []):
              sev = f.get('extra', {}).get('severity', 'INFO')
              if sev in ['ERROR', 'WARNING']:
                  path = f.get('path', '?')
                  line = f.get('start', {}).get('line', '?')
                  msg = f.get('extra', {}).get('message', 'No message')
                  rule = f.get('check_id', '?')
                  print(f'::error file={path},line={line}::[{sev}] {rule}: {msg}')
          "
              exit 1
            fi
          fi
          echo "No high severity SAST findings"

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check for copyleft licenses
        run: |
          npx license-checker --production --failOn 'GPL-2.0;GPL-3.0;AGPL-1.0;AGPL-3.0;SSPL-1.0' --summary 2>&1 || {
            echo "::error::Copyleft license detected in dependencies"
            exit 1
          }
          echo "No copyleft licenses found"
