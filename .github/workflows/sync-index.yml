name: Sync Index

on:
  push:
    branches: [main, dev]
    paths:
      - 'content/skills/**'
      - 'content/plugins/**'
      - 'scripts/generate-cli-index.js'
      - 'scripts/generate-sql-seed.js'
  pull_request:
    branches: [main, dev]
    paths:
      - 'content/skills/**'
      - 'content/plugins/**'
      - 'scripts/generate-cli-index.js'
      - 'scripts/generate-sql-seed.js'

concurrency:
  group: "sync-index-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  sync:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Regenerate Index & Seed
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Regenerate CLI index
        run: node scripts/generate-cli-index.js

      - name: Regenerate SQL seed
        run: node scripts/generate-sql-seed.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cli/data/skills-index.json api/migrations/0002_seed.sql
          if git diff --staged --quiet; then
            echo "No changes to generated files."
          else
            git commit -m "chore: auto-regenerate CLI index and SQL seed"
            git push
          fi

  check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Check Index Freshness
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Save current committed files
        run: |
          cp cli/data/skills-index.json /tmp/committed-index.json
          cp api/migrations/0002_seed.sql /tmp/committed-seed.sql 2>/dev/null || true

      - name: Regenerate CLI index
        run: node scripts/generate-cli-index.js

      - name: Regenerate SQL seed
        run: node scripts/generate-sql-seed.js

      - name: Compare index
        run: |
          if ! diff -q cli/data/skills-index.json /tmp/committed-index.json > /dev/null 2>&1; then
            echo "::error::cli/data/skills-index.json is stale. Run 'node scripts/generate-cli-index.js' and commit the result."
            diff /tmp/committed-index.json cli/data/skills-index.json || true
            echo "INDEX_STALE=true" >> $GITHUB_ENV
          else
            echo "CLI index is up to date."
            echo "INDEX_STALE=false" >> $GITHUB_ENV
          fi

      - name: Compare seed
        run: |
          if [ -f /tmp/committed-seed.sql ]; then
            sed '/^-- Generated:/d' api/migrations/0002_seed.sql > /tmp/new-seed-stripped.sql
            sed '/^-- Generated:/d' /tmp/committed-seed.sql > /tmp/old-seed-stripped.sql
            if ! diff -q /tmp/new-seed-stripped.sql /tmp/old-seed-stripped.sql > /dev/null 2>&1; then
              echo "::error::api/migrations/0002_seed.sql is stale. Run 'node scripts/generate-sql-seed.js' and commit the result."
              echo "SEED_STALE=true" >> $GITHUB_ENV
            else
              echo "SQL seed is up to date."
              echo "SEED_STALE=false" >> $GITHUB_ENV
            fi
          else
            echo "No committed seed file to compare. Skipping."
            echo "SEED_STALE=false" >> $GITHUB_ENV
          fi

      - name: Fail if stale
        if: env.INDEX_STALE == 'true' || env.SEED_STALE == 'true'
        continue-on-error: true
        run: |
          echo "::warning::Generated files are out of date with content."
          echo ""
          echo "To fix, run locally:"
          echo "  node scripts/generate-cli-index.js"
          echo "  node scripts/generate-sql-seed.js"
          echo "  git add cli/data/skills-index.json api/migrations/0002_seed.sql"
          echo "  git commit -m 'chore: regenerate CLI index and SQL seed'"
          exit 1
