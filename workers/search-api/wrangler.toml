name = "openmedica-search-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"

[vars]
# These are overridden in production via secrets
QDRANT_URL = "http://localhost:6333"
SURREALDB_URL = "http://localhost:8000"
OLLAMA_URL = "http://localhost:11434"
QDRANT_COLLECTION = "tu_tools_nomic"
EMBED_MODEL = "nomic-embed-text"
ALLOWED_ORIGIN = "http://localhost:4321"

[env.production]
vars = { ALLOWED_ORIGIN = "https://openmedica.us" }

[[d1_databases]]
binding = "DB"
database_name = "openmedica-skills"
database_id = "2a8dc2dd-5dee-4af8-90b2-e0bfe10e597c"

# In production, these route through Cloudflare Tunnel:
# QDRANT_URL → your-tunnel.example.com (tunnel ingress)
# SURREALDB_URL → your-tunnel.example.com (tunnel ingress)
# OLLAMA_URL → your-tunnel.example.com (tunnel ingress)
